<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Cookbook — We Eat</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/app.css">
  <style>

    .stub-page {
      padding-block: var(--space-8) var(--space-20);
    }

    .stub-back {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-decoration: none;
      margin-bottom: var(--space-10);
      transition: color var(--transition-fast);
    }
    .stub-back:hover { color: var(--color-text-primary); }
    .stub-back svg { width: 14px; height: 14px; }

    .stub-hero {
      max-width: 480px;
    }

    .stub-hero__eyebrow {
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }

    .stub-hero__title {
      font-size: var(--font-size-3xl);
      font-weight: var(--font-weight-extrabold);
      line-height: 1.1;
      letter-spacing: var(--letter-spacing-tight);
      margin-bottom: var(--space-4);
    }

    .stub-hero__sub {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: var(--space-8);
    }

    .stub-placeholder {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4/3;
      background-color: var(--color-bg-subtle);
      border: 1px dashed var(--color-border-strong);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      color: var(--color-text-muted);
    }

    .stub-placeholder svg {
      width: 40px;
      height: 40px;
      opacity: 0.3;
    }

    .stub-placeholder__label {
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-widest);
      text-transform: uppercase;
      /* Page's single accent usage */
      color: var(--color-accent);
    }

  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       APP HEADER
  ═══════════════════════════════════════════════════════ -->
  <header class="app-header">
    <a href="home.html" class="app-header__logo"><img src="../assets/logo.svg" alt="We Eat"></a>

    <nav class="app-nav">
      <a href="home.html"    class="app-nav__link">Home</a>
      <a href="explore.html" class="app-nav__link">Explore</a>
      <a href="plan.html"    class="app-nav__link">Plan</a>

      <div class="app-nav__create-wrap">
        <button class="app-nav__create" aria-label="Create" aria-haspopup="true" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
        <div class="create-menu" role="menu">
          <span class="create-menu__label">Create</span>
          <a href="post-new.html" class="create-menu__item" role="menuitem">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Post
          </a>
          <a href="recipe-new.html" class="create-menu__item" role="menuitem">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            Recipe
          </a>
          <a href="cookbook-new.html" class="create-menu__item create-menu__item--active" role="menuitem">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
            Cookbook
          </a>
          <div class="create-menu__divider"></div>
          <a href="order-new.html" class="create-menu__item" role="menuitem">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Order
          </a>
        </div>
      </div>

      <div class="app-header__icon-wrap">
        <a href="notifications.html" class="btn-icon app-nav__icon" aria-label="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </a>
        <span class="app-header__badge"></span>
      </div>

      <a href="profile.html" class="btn-icon app-nav__icon" aria-label="Profile">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </a>
    </nav>
  </header>


  <!-- ═══════════════════════════════════════════════════════
       APP BODY
  ═══════════════════════════════════════════════════════ -->
  <div class="app-body">
    <div class="page-container">
      <section class="stub-page">

        <a href="profile.html" class="stub-back">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Profile
        </a>

        <div class="stub-hero">
          <p class="stub-hero__eyebrow">Create</p>
          <h1 class="stub-hero__title">New Cookbook</h1>
          <p class="stub-hero__sub">Curate your favourite recipes into a collection. Share it with friends or keep it for yourself.</p>
        </div>

        <div class="stub-placeholder">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
          </svg>
          <span class="stub-placeholder__label">Coming Soon</span>
        </div>

      </section>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       BOTTOM NAV (mobile)
  ═══════════════════════════════════════════════════════ -->
  <nav class="app-bottom-nav" aria-label="Mobile navigation">
    <a href="home.html" class="app-bottom-nav__item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Home
    </a>
    <a href="explore.html" class="app-bottom-nav__item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      Explore
    </a>
    <a href="plan.html" class="app-bottom-nav__item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Plan
    </a>
    <a href="profile.html" class="app-bottom-nav__item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      Profile
    </a>
  </nav>

  <script src="../js/app.js"></script>
</body>
</html>
