<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Recipe — We Eat</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/app.css">
  <style>

    /* ════════════════════════════════════════════════════════
       PAGE
    ════════════════════════════════════════════════════════ */

    .recipe-form-page {
      padding-block: var(--space-8) var(--space-20);
    }

    /* ── Page header row ────────────────────────────────── */

    .form-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-8);
    }

    .form-page-title {
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .form-page-actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    /* ════════════════════════════════════════════════════════
       INTRO: IMAGE UPLOAD (left) + BASICS (right)
    ════════════════════════════════════════════════════════ */

    .form-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-12);
      align-items: stretch;
      margin-bottom: var(--space-12);
    }

    @media (max-width: 900px) {
      .form-intro { grid-template-columns: 1fr; gap: var(--space-8); }
    }

    /* ── Image upload ───────────────────────────────────── */

    .image-upload-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: var(--color-bg-subtle);
      cursor: pointer;
      overflow: hidden;
    }

    .image-upload-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .image-upload-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      border: 2px dashed var(--color-border-strong);
      transition: border-color var(--transition-fast), background-color var(--transition-fast);
      pointer-events: none;
    }
    .image-upload-wrap:hover .image-upload-placeholder {
      border-color: var(--color-black);
      background-color: var(--color-bg-subtle);
    }
    .image-upload-placeholder svg {
      width: 28px;
      height: 28px;
      color: var(--color-text-muted);
    }
    .image-upload-placeholder__label {
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      letter-spacing: var(--letter-spacing-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .image-upload-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    /* ── Basics: right column ───────────────────────────── */

    .form-basics {
      display: flex;
      flex-direction: column;
    }

    /* ── Form inputs — bottom-border only, Nike style ───── */

    .form-field {
      margin-bottom: var(--space-5);
    }

    .form-label {
      display: block;
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-2) 0;
      font-family: var(--font-primary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      background: transparent;
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .form-input:focus { border-bottom-color: var(--color-black); }
    .form-input::placeholder { color: var(--color-text-muted); }

    .form-input--title {
      font-size: clamp(1.5rem, 2.5vw, var(--font-size-2xl));
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.03em;
      line-height: 1.1;
      padding-bottom: var(--space-3);
    }

    .form-textarea {
      resize: none;
      min-height: 80px;
      line-height: var(--line-height-relaxed);
    }

    /* Meta inputs — 2×2 grid */
    .form-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 var(--space-6);
      margin-top: auto;
      padding-top: var(--space-8);
      border-top: 1px solid var(--color-border);
    }

    .form-meta-grid .form-field { margin-bottom: var(--space-4); }

    /* ════════════════════════════════════════════════════════
       FORM BODY: SIDEBAR (ingredients + tools) | DIRECTIONS
    ════════════════════════════════════════════════════════ */

    .form-body {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: var(--space-16);
      align-items: flex-start;
    }

    @media (max-width: 900px) {
      .form-body { grid-template-columns: 1fr; gap: var(--space-12); }
    }

    /* ── Section label ──────────────────────────────────── */

    .section-label {
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
      padding-bottom: var(--space-4);
      border-bottom: 2px solid var(--color-black);
      margin-bottom: var(--space-6);
    }

    /* ════════════════════════════════════════════════════════
       DYNAMIC BLOCKS — shared chrome for groups/sets
    ════════════════════════════════════════════════════════ */

    .dynamic-block {
      border: 1px solid var(--color-border);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
    }

    .dynamic-block__header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .dynamic-block__name {
      flex: 1;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      border: none;
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-1) 0;
      background: transparent;
      font-family: var(--font-primary);
      letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase;
      color: var(--color-text-secondary);
      outline: none;
    }
    .dynamic-block__name:focus { border-bottom-color: var(--color-black); }
    .dynamic-block__name::placeholder { color: var(--color-text-muted); }

    /* Remove block/row button */
    .remove-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      color: var(--color-text-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color var(--transition-fast);
    }
    .remove-btn:hover { color: var(--color-error); }
    .remove-btn svg { width: 14px; height: 14px; }

    /* Add row/block button */
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      letter-spacing: var(--letter-spacing-wider);
      text-transform: uppercase;
      color: var(--color-text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--space-3) 0;
      transition: color var(--transition-fast);
    }
    .add-btn:hover { color: var(--color-text-primary); }
    .add-btn svg { width: 12px; height: 12px; }

    /* Add block button — full width, dashed border */
    .add-block-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-4);
      border: 1px dashed var(--color-border-strong);
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      letter-spacing: var(--letter-spacing-wider);
      text-transform: uppercase;
      color: var(--color-text-muted);
      background: none;
      cursor: pointer;
      transition: border-color var(--transition-fast), color var(--transition-fast);
      margin-top: var(--space-2);
    }
    .add-block-btn:hover { border-color: var(--color-black); color: var(--color-text-primary); }
    .add-block-btn svg { width: 12px; height: 12px; }

    /* ════════════════════════════════════════════════════════
       INGREDIENT ROWS
    ════════════════════════════════════════════════════════ */

    .ingredient-row {
      display: grid;
      grid-template-columns: 72px 1fr 64px 28px;
      gap: var(--space-3);
      align-items: end;
      margin-bottom: var(--space-3);
    }

    /* ════════════════════════════════════════════════════════
       TOOLS
    ════════════════════════════════════════════════════════ */

    .tools-section {
      margin-top: var(--space-8);
      padding-top: var(--space-8);
      border-top: 1px solid var(--color-border);
    }

    .tool-row {
      display: grid;
      grid-template-columns: 1fr 28px;
      gap: var(--space-3);
      align-items: end;
      margin-bottom: var(--space-3);
    }

    /* ════════════════════════════════════════════════════════
       DIRECTION STEPS
    ════════════════════════════════════════════════════════ */

    .step-row {
      display: grid;
      grid-template-columns: 48px 1fr 28px;
      gap: var(--space-4);
      align-items: start;
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .step-row:last-of-type { border-bottom: none; }

    .step-number {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-border-strong);
      line-height: 1;
      letter-spacing: var(--letter-spacing-tight);
      padding-top: var(--space-2);
      user-select: none;
    }

    .step-textarea {
      min-height: 72px;
      padding-top: var(--space-2);
    }

    /* ════════════════════════════════════════════════════════
       FORM FOOTER
    ════════════════════════════════════════════════════════ */

    .form-footer {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-top: var(--space-16);
      padding-top: var(--space-8);
      border-top: 1px solid var(--color-border);
    }

  </style>
</head>

  <script>
    /* ════════════════════════════════════════════════════════
       IMAGE UPLOAD PREVIEW
    ════════════════════════════════════════════════════════ */
    const imageInput   = document.getElementById('image-input');
    const imagePreview = document.getElementById('image-preview');
    const placeholder  = document.querySelector('.image-upload-placeholder');

    imageInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      imagePreview.src = URL.createObjectURL(file);
      imagePreview.style.display = 'block';
      placeholder.style.display  = 'none';
    });

    /* ════════════════════════════════════════════════════════
       REMOVE SVG — reused inline
    ════════════════════════════════════════════════════════ */
    const REMOVE_ICON = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>`;
    const PLUS_ICON   = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>`;

    /* ════════════════════════════════════════════════════════
       STEP NUMBERING — runs after any add/remove
    ════════════════════════════════════════════════════════ */
    function renumberSteps() {
      document.querySelectorAll('#direction-sets-container .step-number').forEach((el, i) => {
        el.textContent = String(i + 1).padStart(2, '0');
      });
    }

    /* ════════════════════════════════════════════════════════
       INGREDIENT GROUPS
    ════════════════════════════════════════════════════════ */
    let groupId = 0;

    function addIngredientGroup() {
      groupId++;
      const id = `ig-${groupId}`;
      const block = document.createElement('div');
      block.className = 'dynamic-block';
      block.id = id;
      block.innerHTML = `
        <div class="dynamic-block__header">
          <input class="dynamic-block__name" type="text" placeholder="Group name (e.g. For the Sauce)">
          <button type="button" class="remove-btn" title="Remove group">${REMOVE_ICON}</button>
        </div>
        <div class="ingredient-rows-container"></div>
        <button type="button" class="add-btn add-ingredient-btn">${PLUS_ICON} Add Ingredient</button>
      `;
      block.querySelector('.remove-btn').addEventListener('click', () => block.remove());
      block.querySelector('.add-ingredient-btn').addEventListener('click', () => addIngredientRow(block));
      document.getElementById('ingredient-groups-container').appendChild(block);
      addIngredientRow(block);
    }

    function addIngredientRow(block) {
      const row = document.createElement('div');
      row.className = 'ingredient-row';
      row.innerHTML = `
        <input class="form-input" type="text" placeholder="Amount">
        <input class="form-input" type="text" placeholder="Ingredient">
        <input class="form-input" type="text" placeholder="Note">
        <button type="button" class="remove-btn" title="Remove">${REMOVE_ICON}</button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', () => row.remove());
      block.querySelector('.ingredient-rows-container').appendChild(row);
    }

    document.getElementById('add-group-btn').addEventListener('click', addIngredientGroup);

    /* ════════════════════════════════════════════════════════
       TOOLS
    ════════════════════════════════════════════════════════ */
    function addTool() {
      const row = document.createElement('div');
      row.className = 'tool-row';
      row.innerHTML = `
        <input class="form-input" type="text" placeholder="Tool name">
        <button type="button" class="remove-btn" title="Remove">${REMOVE_ICON}</button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', () => row.remove());
      document.getElementById('tools-container').appendChild(row);
    }

    document.getElementById('add-tool-btn').addEventListener('click', addTool);

    /* ════════════════════════════════════════════════════════
       DIRECTION SETS
    ════════════════════════════════════════════════════════ */
    let setId = 0;

    function addDirectionSet() {
      setId++;
      const id = `ds-${setId}`;
      const block = document.createElement('div');
      block.className = 'dynamic-block';
      block.id = id;
      block.innerHTML = `
        <div class="dynamic-block__header">
          <input class="dynamic-block__name" type="text" placeholder="Set name (e.g. Prep)">
          <button type="button" class="remove-btn" title="Remove set">${REMOVE_ICON}</button>
        </div>
        <div class="steps-container"></div>
        <button type="button" class="add-btn add-step-btn">${PLUS_ICON} Add Step</button>
      `;
      block.querySelector('.remove-btn').addEventListener('click', () => {
        block.remove();
        renumberSteps();
      });
      block.querySelector('.add-step-btn').addEventListener('click', () => {
        addStep(block);
        renumberSteps();
      });
      document.getElementById('direction-sets-container').appendChild(block);
      addStep(block);
      renumberSteps();
    }

    function addStep(block) {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `
        <span class="step-number">00</span>
        <textarea class="form-input form-textarea step-textarea" placeholder="Describe this step…" rows="3"></textarea>
        <button type="button" class="remove-btn" title="Remove step">${REMOVE_ICON}</button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', () => {
        row.remove();
        renumberSteps();
      });
      block.querySelector('.steps-container').appendChild(row);
    }

    document.getElementById('add-set-btn').addEventListener('click', addDirectionSet);

    /* ════════════════════════════════════════════════════════
       FORM SUBMIT
    ════════════════════════════════════════════════════════ */
    document.getElementById('recipe-form').addEventListener('submit', e => {
      e.preventDefault();
      // TODO: collect form data and POST to API
      alert('Recipe saved! (prototype — no backend yet)');
    });

    /* ════════════════════════════════════════════════════════
       INIT — start with one group, one tool, one set
    ════════════════════════════════════════════════════════ */
    addIngredientGroup();
    addTool();
    addDirectionSet();
  </script>

</body>
</html>
